name: Release

on:
  push:
    tags:
      - 'v*'

env:
  NODE_VERSION: '20'
  NARGO_VERSION: '0.35.0'

jobs:
  # ============================================
  # Build Release Artifacts
  # ============================================
  build:
    name: Build Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Noir (nargo)
        run: |
          curl -L https://raw.githubusercontent.com/noir-lang/noirup/main/install | bash
          echo "$HOME/.nargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: npm ci

      - name: Compile contract
        working-directory: contracts/out_of_office
        run: nargo compile

      - name: Build frontend
        run: npm run build
        env:
          VITE_CONTRACT_ADDRESS: ${{ secrets.VITE_CONTRACT_ADDRESS }}
          VITE_AZTEC_PXE_URL: ${{ secrets.VITE_AZTEC_PXE_URL }}

      - name: Create release archive
        run: |
          mkdir -p release
          cp -r dist release/frontend
          cp -r contracts/out_of_office/target release/contract
          cp README.md DEPLOYMENT.md release/
          tar -czvf outofoffice-${{ github.ref_name }}.tar.gz release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: outofoffice-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # Deploy Production on Release
  # ============================================
  deploy-production:
    name: Deploy Production
    needs: build
    runs-on: ubuntu-latest
    if: "!contains(github.ref_name, 'alpha') && !contains(github.ref_name, 'beta')"
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_CONTRACT_ADDRESS: ${{ secrets.VITE_CONTRACT_ADDRESS }}
          VITE_AZTEC_PXE_URL: ${{ secrets.VITE_AZTEC_PXE_URL }}

      - name: Deploy to Vercel Production
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./
